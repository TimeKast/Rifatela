# =============================================================================
# Each workflow defines:
#   agents_always       — loaded unconditionally
#   agents_conditional  — loaded when condition is met
#   agents_by_tier      — loaded based on workflow tier/level
#   skills_always       — loaded unconditionally
# =============================================================================

workflow_defaults:
  /discovery:
    agents_always: [discovery-expert]
    agents_conditional:
      - agent: explorer-agent
        when:
          file_exists_any: [src/, app/]
      - agent: code-archaeologist
        when:
          file_exists_any: [src/]
      - agent: product-owner
        when:
          keywords_any: [requirements, scope, challenge]
      - agent: architect
        when:
          keywords_any: [architecture, system design, technical]
      - agent: project-planner
        when:
          keywords_any: [roadmap, estimate, timeline]
    skills_always: [roles/discovery]

  /proposal:
    agents_always: [project-planner, product-manager, skeptical-client]
    agents_conditional:
      - agent: architect
        when:
          keywords_any: [architecture, complex, technical decision]
    skills_always: [roles/proposal, brainstorming, app-builder, architecture]

  /docs:
    agents_always: [documentation-writer]
    agents_conditional:
      - agent: explorer-agent
        when:
          file_exists_any: [src/lib/actions/]
    skills_always: [roles/docs, documentation-templates, architecture, plan-writing]

  /design:
    agents_always: [visual-design-director, layout-composer, frontend-specialist]
    agents_conditional:
      - agent: mobile-developer
        when:
          keywords_any: [mobile, iOS, android]
      - agent: flutter-mobile
        when:
          keywords_any: [flutter, dart, widget, arb]
      - agent: seo-specialist
        when:
          keywords_any: [SEO, metadata, sitemap]
      - agent: game-developer
        when:
          keywords_any: [game, canvas, sprite]
      - agent: dataviz-specialist
        when:
          keywords_any: [dashboard, chart, data viz, KPI]
      - agent: architect
        when:
          keywords_any: [architecture, complex, system design]
    skills_always: [roles/design, frontend-design, domains/ui]

  /backlog:
    agents_always: [project-planner]
    agents_conditional:
      - agent: architect
        when:
          keywords_any: [architecture, complex, multi-module]
    skills_always: [roles/backlog, plan-writing, architecture]

  /implement:
    agents_always: [test-engineer]
    agents_conditional:
      - agent: architect
        when:
          file_count_gt: 3
      - agent: project-planner
        when:
          file_count_gt: 3
    skills_always: [clean-code]
    # Everything else comes from issue fields or fallback

  /audit_deep:
    agents_always: [quality-engineer]
    agents_by_tier:
      R2: [security-auditor, backend-specialist]
      R3: [devops-engineer, performance-optimizer, test-engineer]
    skills_always: [code-review-checklist, vulnerability-scanner, testing-patterns]

  /debug:
    agents_always: [debugger]
    skills_always: [systematic-debugging, domains/api, domains/db, domains/ui]

# =============================================================================
# §D — ISSUE ASSIGNMENT COMBOS
# =============================================================================
# Each combo defines:
#   match.any      — match ANY keyword to trigger
#   match.all      — ALL keywords must be present (optional)
#   dimension      — domain dimension (ui, db, api, security, testing, infra, docs, mobile)
#   agents         — agents to assign
#   skills         — skills to assign
# =============================================================================

issue_combos:
  schema_db:
    match:
      any: [schema, migration, createTable, seed]
      all: [drizzle]
    dimension: db
    agents: [database-architect, data-modeler-drizzle]
    skills: [domains/db, kit/database-design]

  server_action:
    match:
      any: [server action, API, endpoint, cron, webhook]
    dimension: api
    agents: [backend-specialist]
    skills: [domains/api, kit/api-patterns]

  server_action_complex:
    match:
      any: [business rules, anti-fraud, validation complex]
    dimension: api
    agents: [backend-specialist]
    skills: [domains/api]

  ui_crud:
    match:
      any: [CRUD, DataTable, form page, table page, list view]
    dimension: ui
    agents: [frontend-specialist]
    skills: [domains/ui, kit/nextjs-react-expert]

  ui_visual:
    match:
      any: [card, badge, visual component, new component, custom UI]
    dimension: ui
    agents: [frontend-specialist, design-engineer]
    skills: [domains/ui, kit/nextjs-react-expert, kit/design-engineering]

  ui_dashboard:
    match:
      any: [dashboard, KPI, chart, metrics, analytics, visualization]
    dimension: ui
    agents: [frontend-specialist, design-engineer, dataviz-specialist]
    skills: [domains/ui, kit/design-engineering, kit/data-storytelling-design]

  branding_theming:
    match:
      any: [branding, theming, visual identity, color palette, skin]
    dimension: ui
    agents: [design-engineer]
    skills:
      [domains/ui, kit/design-engineering, kit/tailwind-patterns, kit/design-system-principles]

  auth_rbac:
    match:
      any: [auth, RBAC, permissions, login, session, role]
    dimension: security
    agents: [backend-specialist, security-auditor]
    skills: [domains/security, domains/api]

  testing_unit:
    match:
      any: [unit test, integration test, vitest, mock]
    dimension: testing
    agents: [test-engineer]
    skills: [kit/testing-patterns]

  testing_e2e:
    match:
      any: [e2e, playwright, browser test]
    dimension: testing
    agents: [test-engineer]
    skills: [kit/webapp-testing]

  cron_email:
    match:
      any: [cron, email template, scheduled job, background job]
    dimension: api
    agents: [backend-specialist]
    skills: [domains/api, kit/bash-linux]

  docs_technical:
    match:
      any: [documentation, README, changelog, ADR, wiki]
    dimension: docs
    agents: [documentation-writer]
    skills: [kit/documentation-templates]

  mobile_flutter:
    match:
      any: [flutter, dart, widget, provider, arb, pubspec]
    dimension: mobile
    agents: [flutter-mobile]
    skills: [kit/flutter-mobile-design]

  mobile_react_native:
    match:
      any: [react native, expo, metro, react-native]
    dimension: mobile
    agents: [mobile-developer]
    skills: [kit/mobile-design]

  performance_audit:
    match:
      any: [performance, lighthouse, slow, bundle, Core Web Vitals]
    dimension: infra
    agents: [performance-optimizer]
    skills: [kit/performance-profiling]

  design_system_theming:
    match:
      any: [tokens, theme system, design system, typography system, spacing scale]
    dimension: ui
    agents: [design-system-lead, design-engineer]
    skills: [kit/design-engineering, kit/tailwind-patterns, kit/design-system-principles]

  pwa:
    match:
      any: [PWA, service worker, offline, manifest, installable, cache strategy]
    dimension: ui
    agents: [frontend-specialist]
    skills: [domains/ui, kit/nextjs-react-expert]

  i18n:
    match:
      any: [i18n, internationalization, locale, translation, RTL, multi-language]
    dimension: ui
    agents: [frontend-specialist]
    skills: [kit/i18n-localization]

  infra_cicd:
    match:
      any: [CI/CD, deploy, pipeline, GitHub Actions, vercel, staging, release]
    dimension: infra
    agents: [devops-engineer]
    skills: [kit/deployment-procedures]

  refactoring:
    match:
      any:
        [
          refactor,
          refactorizar,
          clean up,
          dead code,
          technical debt,
          deuda técnica,
          optimize,
          reorganize,
          simplify,
          extract,
          consolidate,
        ]
    dimension: code
    agents: [architect, backend-specialist]
    skills: [universal/clean-code, kit/performance-profiling]

  seo:
    match:
      any: [SEO, meta tags, sitemap, indexing, Open Graph, schema markup, GEO]
    dimension: ui
    agents: [seo-specialist]
    skills: [kit/seo-geo-engine]

  project_setup:
    match:
      any: [setup, configurar, env vars, secrets, branding, deploy platform, seed, initial config]
    dimension: infra
    agents: [backend-specialist]
    skills: [domains/security, kit/deployment-procedures]

# Resolution algorithm (8 steps)
resolution_algorithm:
  steps:
    1: detect_matching_combos # find all combos that match the issue
    2: select_primary_combo # pick highest-match combo
    3: allow_one_complement # if clearly different dimension, add 1 more
    4: enrich_via_scoring # run core_scoring for additional skills only
    5: apply_agent_relationships # narrows, excludes
    6: dedupe_alphabetical # remove duplicates
    7: apply_caps # max 3 agents, max 5 skills
    8: write_to_issue # > **Agents:** `...` > **Skills:** `...`
  validation_rule: 'Every issue MUST have >= 1 skill + >= 1 agent'

# =============================================================================
# §E — FALLBACK POLICY
# =============================================================================
# Evaluated INDEPENDENTLY for agents and skills.
# Step 1: Try contextual detection.
# Step 2: If nothing detected → use generic fullstack pair.
# =============================================================================

fallback_policy:
  # Agents and skills are evaluated independently
  independent: true

  # STEP 1: Contextual — detect domain from issue content
  contextual:
    - detect:
        keywords_any: [schema, query, migration, drizzle, database]
      agents: [database-architect]
      skills: [domains/db]

    - detect:
        keywords_any: [auth, RBAC, session, permission, login]
      agents: [security-auditor]
      skills: [domains/security]

    - detect:
        keywords_any: [test, vitest, playwright, e2e, coverage]
      agents: [test-engineer]
      skills: [domains/testing]

    - detect:
        keywords_any: [deploy, CI/CD, vercel, release]
      agents: [devops-engineer]
      skills: [kit/deployment-procedures]

    - detect:
        keywords_any: [docs, documentation, README, changelog]
      agents: [documentation-writer]
      skills: [kit/documentation-templates]

  # STEP 2: Generic fullstack — only if contextual detected nothing
  generic:
    agents: [frontend-specialist, backend-specialist]
    skills: [domains/ui, domains/api]
