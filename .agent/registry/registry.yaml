# =============================================================================
# §B — ROUTING POLICY
# =============================================================================

routing_policy:
  # Order of precedence for agent/skill selection (highest to lowest)
  precedence:
    1: user_explicit # @agent, @skill — user mentions directly
    2: workflow_hard # roles + mandatory agents per workflow
    3: issue_fields # Skills: and Agents: fields from issue
    4: project_routing # only if enabled in project.yaml
    5: core_scoring # keywords_any/all + priority scoring
    6: fallbacks # contextual → generic

  # Scoring weights for keyword matching
  scoring:
    keywords_any_match: 10 # per keyword matched
    keywords_all_match: 25 # bonus if ALL keywords_all present
    negative_match: -100 # disqualifies candidate
    domain_match: 15 # if issue domain matches agent domain
    min_score_threshold: 20 # minimum score to activate

  # Tie-breaking rules (applied in order when scores are equal)
  tie_breakers:
    - prefer_higher_priority # agent.priority value
    - prefer_domain_specific # agent with matching domain wins
    - prefer_issue_combo_agent # agents suggested by issue_combos win
    - prefer_project_agent # if project.yaml enabled

  # Relationships between agents
  agent_relationships:
    data-modeler-drizzle:
      narrows: database-architect # more specific → preferred when drizzle present
    flutter-mobile:
      excludes: mobile-developer # never load both
    design-engineer:
      complements: frontend-specialist # different focus, can coexist

  # Hard limits
  caps:
    max_agents_per_issue: 3
    max_skills_per_issue: 5

  # Announcement format when agent/skills are activated
  announcement: |
    🤖 Aplicando conocimiento de `@{agent-name}`...
    🧰 Skills: `{skill-1}`, `{skill-2}`

