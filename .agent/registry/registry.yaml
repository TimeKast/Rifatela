# =============================================================================
# Agent Registry — Single Source of Truth (SSOT)
# =============================================================================
# TimeKast Factory Agent System
#
# This file consolidates agent/skill routing, workflow defaults, issue
# assignment combos, and fallback policy into a single machine-readable format.
#
# Sections:
#   §A  agents / skills   — Catalog (WHO exists)
#   §B  routing_policy     — HOW selection works
#   §C  workflow_defaults  — WHEN agents load per workflow
#   §D  issue_combos       — WHAT loads per issue type
#   §E  fallback_policy    — SAFETY NET when nothing matches
#
# Generated views (by build_registry.py — REG-002):
#   .agent/REGISTRY.md          — full human-readable
#   .agent/REGISTRY.skills.md   — skills slice for /backlog
#   .agent/REGISTRY.agents.md   — agents slice for /implement
#   .agent/REGISTRY.combos.md   — issue combos for /backlog add
#   .agent/REGISTRY.fallbacks.md — fallback rules for /implement
#
# Validate: python3 -c "import yaml; yaml.safe_load(open('registry.yaml'))"
# =============================================================================

# =============================================================================
# §A — CATALOG
# =============================================================================

# -----------------------------------------------------------------------------
# §A.1 — Agents (30)
# -----------------------------------------------------------------------------
# Fields:
#   path             — relative to .agent/ (must exist)
#   scope            — kit | project
#   keywords_any     — match ANY to activate (EN)
#   keywords_es      — match ANY to activate (ES)
#   keywords_all     — ALL must match (optional, for disambiguation)
#   negative_keywords — if ANY match, agent is disqualified
#   domains          — associated domain(s) for domain_match scoring
#   activation_mode  — auto | workflow_only | explicit_only
#   priority         — 0-100, higher = preferred in tie-breaks
# -----------------------------------------------------------------------------

